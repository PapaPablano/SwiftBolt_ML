name: CI - Lightweight (Code Quality)

# Trigger on pushes and PRs to main branches
on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:

# Cancel in-progress runs for same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # CHANGE DETECTION - Determine what needs testing
  # ===========================================================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      ml: ${{ steps.filter.outputs.ml }}
      ml_requirements: ${{ steps.filter.outputs.ml_requirements }}
      edge_functions: ${{ steps.filter.outputs.edge_functions }}
      migrations: ${{ steps.filter.outputs.migrations }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check changed files
      uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          ml:
            - 'ml/**'
            - 'requirements*.txt'
          ml_requirements:
            - 'ml/requirements*.txt'
            - 'requirements*.txt'
          edge_functions:
            - 'supabase/functions/**'
            - 'backend/supabase/functions/**'
          migrations:
            - 'supabase/migrations/**'
            - 'supabase/seed.sql'

  # ===========================================================================
  # ML CODE QUALITY (Linting only - no heavy dependencies)
  # ===========================================================================
  lint-ml:
    name: ML Linting & Type Checks
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.ml == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Cache linting tools
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-lint-${{ hashFiles('.github/workflows/ci-lightweight.yml') }}
        restore-keys: |
          ${{ runner.os }}-pip-lint-

    - name: Install linting tools (lightweight only)
      run: |
        cd ml
        python -m pip install --upgrade pip
        # Only install linting tools - NOT the full ML stack
        pip install "black==26.1.0" mypy flake8 isort bandit safety

    - name: Check formatting (Black)
      run: |
        cd ml
        # Exclude files with pre-existing syntax errors that Black cannot parse.
        # Use --extend-exclude to ADD to pyproject.toml excludes (not replace them).
        black --check src tests \
          --extend-exclude "(hardcoded_env\.py|validation_api\.py)" || (
          echo "❌ Code formatting issues detected"
          echo "Run: cd ml && black src tests --extend-exclude '(hardcoded_env\.py|validation_api\.py)'"
          exit 1
        )

    - name: Check import sorting (isort)
      run: |
        cd ml
        isort --check-only src tests || (
          echo "❌ Import sorting issues detected"
          echo "Run: isort src tests"
          exit 1
        )

    - name: Lint (flake8)
      run: |
        cd ml
        flake8 src tests \
          --max-line-length=120 \
          --extend-ignore=E203,W503 \
          --statistics

    - name: Type check (mypy)
      continue-on-error: true
      run: |
        cd ml
        mypy src --ignore-missing-imports --pretty

    - name: Security check (Bandit)
      continue-on-error: true
      run: |
        cd ml
        bandit -r src -f json -o bandit-report.json
        bandit -r src -f screen

    - name: Dependency vulnerabilities (Safety)
      continue-on-error: true
      run: |
        cd ml
        safety check --json || echo "⚠️ Some vulnerabilities detected"

  # ===========================================================================
  # EDGE FUNCTIONS TESTS
  # ===========================================================================
  test-edge-functions:
    name: Edge Functions Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.edge_functions == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Deno
      uses: denoland/setup-deno@v1
      with:
        deno-version: v2.x

    - name: Cache Deno dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.deno
          ~/.cache/deno
        key: ${{ runner.os }}-deno-${{ hashFiles('**/deno.lock') }}
        restore-keys: |
          ${{ runner.os }}-deno-

    - name: Format check
      run: deno fmt --check supabase/functions/

    - name: Lint
      run: deno lint supabase/functions/

    - name: Type check
      continue-on-error: true
      run: |
        for func in supabase/functions/*/index.ts; do
          if [ -f "$func" ]; then
            echo "Type checking: $func"
            deno check "$func"
          fi
        done

    - name: Run tests
      continue-on-error: true
      run: |
        if ls supabase/functions/**/*_test.ts 2>/dev/null; then
          deno test --allow-all supabase/functions/
        else
          echo "⚠️ No tests found - consider adding *_test.ts files"
        fi

    - name: Validate structure
      run: |
        for dir in supabase/functions/*/; do
          func_name=$(basename "$dir")
          if [ "$func_name" = "_shared" ] || [ "$func_name" = "tests" ]; then continue; fi

          if [ ! -f "${dir}index.ts" ]; then
            echo "❌ Missing index.ts in $func_name"
            exit 1
          fi
        done
        echo "✅ All functions have valid structure"

  # ===========================================================================
  # DATABASE MIGRATION VALIDATION
  # ===========================================================================
  validate-migrations:
    name: Validate DB Migrations
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.migrations == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate migration files
      run: |
        echo "Validating migration file structure..."

        # Check migration naming convention
        for file in supabase/migrations/*.sql; do
          if [ -f "$file" ]; then
            filename=$(basename "$file")

            # Check format: YYYYMMDDHHMMSS_description.sql
            if ! echo "$filename" | grep -qE '^[0-9]{14}_.*\.sql$'; then
              echo "❌ Invalid migration name: $filename"
              echo "Expected format: YYYYMMDDHHMMSS_description.sql"
              exit 1
            fi

            echo "✅ $filename"
          fi
        done

    - name: Check for SQL syntax errors
      run: |
        echo "Checking SQL syntax..."

        for file in supabase/migrations/*.sql; do
          if [ -f "$file" ]; then
            # Basic syntax validation (checks for common errors)
            if grep -qE "(CREAT TABLE|ALTE TABLE|DELTE FROM)" "$file"; then
              echo "⚠️ Possible typo in $file"
            fi
          fi
        done

        echo "✅ SQL syntax check complete"

  # ===========================================================================
  # ML UNIT TESTS (runs when ml/ changes; matrix 3.10 + 3.11)
  # ===========================================================================
  test-ml:
    name: ML Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.ml == 'true'
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup ML environment
      uses: ./.github/actions/setup-ml-env
      with:
        python-version: ${{ matrix.python-version }}
        install-dev-deps: 'true'

    - name: Install test tools and package
      run: |
        pip install pytest pytest-cov diff-cover
        # Install ml package in editable mode so relative imports work (e.g. greeks_validator.py)
        pip install -e ml/

    - name: Run unit tests
      working-directory: ml
      env:
        # Dummy values for pydantic-settings; tests/conftest.py patches supabase.create_client.
        SUPABASE_URL: "https://placeholder.supabase.co"
        SUPABASE_KEY: "placeholder-key-for-ci"
      run: |
        pytest tests/ -m "not integration" \
          --cov=src \
          --cov-report=xml \
          --cov-report=term-missing \
          --ignore=tests/test_unified_validator.py \
          --ignore=tests/test_futures_loadability.py \
          --ignore=tests/test_intraday_daily_feedback.py \
          --ignore=tests/test_canonical_intraday_points.py \
          --ignore=tests/test_forecast_validator.py \
          -v --tb=short

    - name: Enforce diff coverage (>=90%)
      working-directory: ml
      continue-on-error: true
      run: |
        diff-cover coverage.xml \
          --compare-branch origin/${{ github.base_ref || 'master' }} \
          --fail-under 90

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-py${{ matrix.python-version }}-${{ github.run_id }}
        path: ml/coverage.xml
        retention-days: 7

  # ===========================================================================
  # ML INTEGRATION TESTS (runs only when requirements change or manual dispatch)
  # ===========================================================================
  integration-test-ml:
    name: ML Integration Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.ml_requirements == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup ML environment
      uses: ./.github/actions/setup-ml-env
      with:
        python-version: '3.10'
        install-dev-deps: 'true'

    - name: Install test tools and package
      run: |
        pip install pytest
        pip install -e ml/

    - name: Run integration tests
      working-directory: ml
      continue-on-error: true
      env:
        SUPABASE_URL: "https://placeholder.supabase.co"
        SUPABASE_KEY: "placeholder-key-for-ci"
      run: |
        pytest tests/ -m integration --continue-on-collection-errors -v --tb=short

  # ===========================================================================
  # COMPREHENSIVE REPORT
  # ===========================================================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-ml, test-edge-functions, validate-migrations, test-ml, integration-test-ml]
    if: always()

    steps:
    - name: Generate summary
      run: |
        echo "# 🚀 CI Test Results (Lightweight)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Actor**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        echo "## 📊 Code Quality Checks" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Changed components
        echo "### Changed Components" >> $GITHUB_STEP_SUMMARY
        if [ "${{ needs.detect-changes.outputs.ml }}" = "true" ]; then
          echo "- 🐍 ML Code (linting + unit tests)" >> $GITHUB_STEP_SUMMARY
        fi
        if [ "${{ needs.detect-changes.outputs.edge_functions }}" = "true" ]; then
          echo "- ⚡ Edge Functions" >> $GITHUB_STEP_SUMMARY
        fi
        if [ "${{ needs.detect-changes.outputs.migrations }}" = "true" ]; then
          echo "- 🗄️ Database Migrations" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY

        # Job results
        echo "### Job Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # ML Linting
        if [ "${{ needs.detect-changes.outputs.ml }}" = "true" ]; then
          if [ "${{ needs.lint-ml.result }}" = "success" ]; then
            echo "✅ ML Linting: **PASSED**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.lint-ml.result }}" = "skipped" ]; then
            echo "⏭️ ML Linting: SKIPPED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ ML Linting: **FAILED**" >> $GITHUB_STEP_SUMMARY
          fi
        fi

        # ML Unit Tests
        if [ "${{ needs.detect-changes.outputs.ml }}" = "true" ]; then
          if [ "${{ needs.test-ml.result }}" = "success" ]; then
            echo "✅ ML Unit Tests (3.10 + 3.11): **PASSED**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.test-ml.result }}" = "skipped" ]; then
            echo "⏭️ ML Unit Tests: SKIPPED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ ML Unit Tests: **FAILED**" >> $GITHUB_STEP_SUMMARY
          fi
        fi

        # ML Integration Tests
        if [ "${{ needs.integration-test-ml.result }}" = "success" ]; then
          echo "✅ ML Integration Tests: **PASSED**" >> $GITHUB_STEP_SUMMARY
        elif [ "${{ needs.integration-test-ml.result }}" = "skipped" ]; then
          echo "⏭️ ML Integration Tests: SKIPPED (no requirements change)" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ ML Integration Tests: FAILED (non-blocking)" >> $GITHUB_STEP_SUMMARY
        fi

        # Edge Functions
        if [ "${{ needs.detect-changes.outputs.edge_functions }}" = "true" ]; then
          if [ "${{ needs.test-edge-functions.result }}" = "success" ]; then
            echo "✅ Edge Functions: **PASSED**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.test-edge-functions.result }}" = "skipped" ]; then
            echo "⏭️ Edge Functions: SKIPPED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Edge Functions: **FAILED**" >> $GITHUB_STEP_SUMMARY
          fi
        fi

        # Migrations
        if [ "${{ needs.detect-changes.outputs.migrations }}" = "true" ]; then
          if [ "${{ needs.validate-migrations.result }}" = "success" ]; then
            echo "✅ Migration Validation: **PASSED**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.validate-migrations.result }}" = "skipped" ]; then
            echo "⏭️ Migration Validation: SKIPPED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Migration Validation: **FAILED**" >> $GITHUB_STEP_SUMMARY
          fi
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "_Generated by GitHub Actions_" >> $GITHUB_STEP_SUMMARY

    - name: Check overall status
      run: |
        # Fail if any required job failed
        if [ "${{ needs.lint-ml.result }}" = "failure" ] || \
           [ "${{ needs.test-ml.result }}" = "failure" ] || \
           [ "${{ needs.test-edge-functions.result }}" = "failure" ] || \
           [ "${{ needs.validate-migrations.result }}" = "failure" ]; then
          echo "❌ One or more CI jobs failed"
          exit 1
        fi

        echo "✅ All CI checks passed!"
