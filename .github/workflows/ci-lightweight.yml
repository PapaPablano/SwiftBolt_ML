# =============================================================================
# GROUP: 1: Lint/Test
# PURPOSE: Runs change-detection, ML linting, Edge Function checks, migration
#          validation, unit tests, contract tests, and integration tests on PRs.
# TRIGGERS: push to master/main/develop, pull_request to same, workflow_dispatch
# COMPONENTS: ml/, supabase/functions/, supabase/migrations/, client-macos/
# SECRETS: SUPABASE_URL, SUPABASE_KEY
# =============================================================================
name: CI - Lightweight (Code Quality)

# Trigger on pushes and PRs to main branches
on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:

# Cancel in-progress runs for same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # CHANGE DETECTION - Determine what needs testing
  # ===========================================================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      ml: ${{ steps.filter.outputs.ml }}
      ml_requirements: ${{ steps.filter.outputs.ml_requirements }}
      edge_functions: ${{ steps.filter.outputs.edge_functions }}
      migrations: ${{ steps.filter.outputs.migrations }}
      swift_client: ${{ steps.filter.outputs.swift_client }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check changed files
      uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          ml:
            - 'ml/**'
            - 'requirements*.txt'
          ml_requirements:
            - 'ml/requirements*.txt'
            - 'requirements*.txt'
          edge_functions:
            - 'supabase/functions/**'
            - 'backend/supabase/functions/**'
          migrations:
            - 'supabase/migrations/**'
            - 'supabase/seed.sql'
          swift_client:
            - 'client-macos/**/*.swift'

  # ===========================================================================
  # ML CODE QUALITY (Linting only - no heavy dependencies)
  # ===========================================================================
  lint-ml:
    name: ML Linting & Type Checks
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.ml == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Cache linting tools
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-lint-${{ hashFiles('.github/workflows/ci-lightweight.yml') }}
        restore-keys: |
          ${{ runner.os }}-pip-lint-

    - name: Install linting tools (lightweight only)
      run: |
        cd ml
        python -m pip install --upgrade pip
        # Only install linting tools - NOT the full ML stack
        pip install "black==26.1.0" mypy flake8 isort bandit safety

    - name: Check formatting (Black)
      run: |
        cd ml
        # Exclude files with pre-existing syntax errors that Black cannot parse.
        # Use --extend-exclude to ADD to pyproject.toml excludes (not replace them).
        black --check src tests \
          --extend-exclude "(hardcoded_env\.py|validation_api\.py)" || (
          echo "❌ Code formatting issues detected"
          echo "Run: cd ml && black src tests --extend-exclude '(hardcoded_env\.py|validation_api\.py)'"
          exit 1
        )

    - name: Check import sorting (isort)
      run: |
        cd ml
        isort --check-only src tests || (
          echo "❌ Import sorting issues detected"
          echo "Run: isort src tests"
          exit 1
        )

    - name: Lint (flake8)
      continue-on-error: true
      run: |
        cd ml
        flake8 src tests \
          --max-line-length=120 \
          --extend-ignore=E203,W503 \
          --statistics

    - name: Type check (mypy)
      continue-on-error: true
      run: |
        cd ml
        mypy src --ignore-missing-imports --pretty

    - name: Security check (Bandit)
      continue-on-error: true
      run: |
        cd ml
        bandit -r src -f json -o bandit-report.json
        bandit -r src -f screen

    - name: Dependency vulnerabilities (Safety)
      continue-on-error: true
      run: |
        cd ml
        safety check --json || echo "⚠️ Some vulnerabilities detected"

  # ===========================================================================
  # EDGE FUNCTIONS TESTS
  # ===========================================================================
  test-edge-functions:
    name: Edge Functions Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.edge_functions == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Deno
      uses: denoland/setup-deno@v1
      with:
        deno-version: v2.x

    - name: Cache Deno dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.deno
          ~/.cache/deno
        key: ${{ runner.os }}-deno-${{ hashFiles('**/deno.lock') }}
        restore-keys: |
          ${{ runner.os }}-deno-

    - name: Format check
      run: deno fmt --check supabase/functions/

    - name: Lint
      run: deno lint supabase/functions/

    - name: Type check
      continue-on-error: true
      run: |
        for func in supabase/functions/*/index.ts; do
          if [ -f "$func" ]; then
            echo "Type checking: $func"
            deno check "$func"
          fi
        done

    - name: Run tests
      continue-on-error: true
      run: |
        if ls supabase/functions/**/*_test.ts 2>/dev/null; then
          deno test --allow-all supabase/functions/
        else
          echo "⚠️ No tests found - consider adding *_test.ts files"
        fi

    - name: Validate structure
      run: |
        for dir in supabase/functions/*/; do
          func_name=$(basename "$dir")
          if [ "$func_name" = "_shared" ] || [ "$func_name" = "tests" ]; then continue; fi

          if [ ! -f "${dir}index.ts" ]; then
            echo "❌ Missing index.ts in $func_name"
            exit 1
          fi
        done
        echo "✅ All functions have valid structure"

  # ===========================================================================
  # DATABASE MIGRATION VALIDATION
  # ===========================================================================
  validate-migrations:
    name: Validate DB Migrations
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.migrations == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate migration files
      run: |
        echo "Validating migration file structure..."

        # Check migration naming convention
        for file in supabase/migrations/*.sql; do
          if [ -f "$file" ]; then
            filename=$(basename "$file")

            # Check format: YYYYMMDDHHMMSS_description.sql
            if ! echo "$filename" | grep -qE '^[0-9]{14}_.*\.sql$'; then
              echo "❌ Invalid migration name: $filename"
              echo "Expected format: YYYYMMDDHHMMSS_description.sql"
              exit 1
            fi

            echo "✅ $filename"
          fi
        done

    - name: Check for SQL syntax errors
      run: |
        echo "Checking SQL syntax..."

        for file in supabase/migrations/*.sql; do
          if [ -f "$file" ]; then
            # Basic syntax validation (checks for common errors)
            if grep -qE "(CREAT TABLE|ALTE TABLE|DELTE FROM)" "$file"; then
              echo "⚠️ Possible typo in $file"
            fi
          fi
        done

        echo "✅ SQL syntax check complete"

  # ===========================================================================
  # ML UNIT TESTS (runs when ml/ changes; matrix 3.10 + 3.11)
  # ===========================================================================
  test-ml:
    name: ML Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.ml == 'true'
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup ML environment
      uses: ./.github/actions/setup-ml-env
      with:
        python-version: ${{ matrix.python-version }}
        install-dev-deps: 'true'

    - name: Install test tools and package
      run: |
        pip install pytest pytest-cov diff-cover
        # Install ml package in editable mode so relative imports work (e.g. greeks_validator.py)
        pip install -e ml/

    - name: Run unit tests
      working-directory: ml
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        pytest tests/ -m "not integration" \
          --cov=src \
          --cov-report=xml \
          --cov-report=term-missing \
          --ignore=tests/test_unified_validator.py \
          --ignore=tests/test_futures_loadability.py \
          --ignore=tests/test_intraday_daily_feedback.py \
          --ignore=tests/test_canonical_intraday_points.py \
          --ignore=tests/test_forecast_validator.py \
          --ignore=tests/test_l1_gate_evaluator_guardrail.py \
          --ignore=tests/test_options_momentum_ranker_iv_quality.py \
          --ignore=tests/test_ranking_calculations.py \
          --ignore=tests/test_technical_indicators.py \
          -v --tb=short

    - name: Enforce diff coverage (>=90%)
      working-directory: ml
      continue-on-error: true
      run: |
        diff-cover coverage.xml \
          --compare-branch origin/${{ github.base_ref || 'master' }} \
          --fail-under 90

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-py${{ matrix.python-version }}-${{ github.run_id }}
        path: ml/coverage.xml
        retention-days: 7

  # ===========================================================================
  # ML INTEGRATION TESTS (runs only when requirements change or manual dispatch)
  # ===========================================================================
  integration-test-ml:
    name: ML Integration Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.ml_requirements == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup ML environment
      uses: ./.github/actions/setup-ml-env
      with:
        python-version: '3.10'
        install-dev-deps: 'true'

    - name: Install test tools and package
      run: |
        pip install pytest
        pip install -e ml/

    - name: Run integration tests
      working-directory: ml
      continue-on-error: true
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        pytest tests/ -m integration --continue-on-collection-errors -v --tb=short

  # ===========================================================================
  # API CONTRACT TESTS (runs when edge functions or Swift client change)
  # ===========================================================================
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.edge_functions == 'true' ||
      needs.detect-changes.outputs.swift_client == 'true'
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        npm install -g ajv-cli ajv-formats

    - name: Create schema definitions
      run: |
        mkdir -p /tmp/schemas

        # Chart endpoint schema
        cat > /tmp/schemas/chart.schema.json << 'EOF'
        {
          "$schema": "http://json-schema.org/draft-07/schema#",
          "type": "object",
          "required": ["symbol", "timeframe", "bars", "meta", "freshness"],
          "properties": {
            "symbol": { "type": "string" },
            "timeframe": { "type": "string" },
            "bars": {
              "type": "array",
              "items": {
                "type": "object",
                "required": ["ts", "open", "high", "low", "close", "volume"],
                "properties": {
                  "ts": { "type": "string" },
                  "open": { "type": "number" },
                  "high": { "type": "number" },
                  "low": { "type": "number" },
                  "close": { "type": "number" },
                  "volume": { "type": "number" },
                  "provider": { "type": "string" },
                  "dataStatus": { "type": "string" }
                }
              }
            },
            "forecast": {
              "type": ["object", "null"],
              "properties": {
                "label": { "type": "string" },
                "confidence": { "type": "number" },
                "horizon": { "type": "string" },
                "runAt": { "type": "string" },
                "points": { "type": "array" }
              }
            },
            "optionsRanks": { "type": "array" },
            "meta": {
              "type": "object",
              "required": ["dataStatus", "isMarketOpen", "totalBars"],
              "properties": {
                "lastBarTs": { "type": ["string", "null"] },
                "dataStatus": { "type": "string", "enum": ["fresh", "stale", "updating"] },
                "isMarketOpen": { "type": "boolean" },
                "latestForecastRunAt": { "type": ["string", "null"] },
                "hasPendingSplits": { "type": "boolean" },
                "pendingSplitInfo": { "type": ["string", "null"] },
                "totalBars": { "type": "integer" },
                "requestedRange": {
                  "type": "object",
                  "properties": {
                    "start": { "type": "string" },
                    "end": { "type": "string" }
                  }
                }
              }
            },
            "freshness": {
              "type": "object",
              "required": ["slaMinutes", "isWithinSla"],
              "properties": {
                "ageMinutes": { "type": ["integer", "null"] },
                "slaMinutes": { "type": "integer" },
                "isWithinSla": { "type": "boolean" }
              }
            }
          }
        }
        EOF

        # User-refresh endpoint schema
        cat > /tmp/schemas/user-refresh.schema.json << 'EOF'
        {
          "$schema": "http://json-schema.org/draft-07/schema#",
          "type": "object",
          "required": ["symbol", "success", "steps", "summary", "message", "durationMs"],
          "properties": {
            "symbol": { "type": "string" },
            "success": { "type": "boolean" },
            "steps": {
              "type": "array",
              "items": {
                "type": "object",
                "required": ["step", "status"],
                "properties": {
                  "step": { "type": "string" },
                  "status": { "type": "string", "enum": ["pending", "running", "completed", "skipped", "failed"] },
                  "message": { "type": ["string", "null"] },
                  "details": { "type": "object" }
                }
              }
            },
            "summary": {
              "type": "object",
              "required": ["backfillNeeded", "backfillQueued", "barsUpdated", "mlJobQueued", "optionsJobQueued", "srCalculated"],
              "properties": {
                "backfillNeeded": { "type": "boolean" },
                "backfillQueued": { "type": "boolean" },
                "barsUpdated": { "type": "integer" },
                "mlJobQueued": { "type": "boolean" },
                "optionsJobQueued": { "type": "boolean" },
                "srCalculated": { "type": "boolean" }
              }
            },
            "queuedJobs": { "type": "array", "items": { "type": "string" } },
            "warnings": { "type": "array", "items": { "type": "string" } },
            "nextExpectedUpdate": { "type": ["string", "null"] },
            "message": { "type": "string" },
            "durationMs": { "type": "integer" }
          }
        }
        EOF

        # Data-health endpoint schema
        cat > /tmp/schemas/data-health.schema.json << 'EOF'
        {
          "$schema": "http://json-schema.org/draft-07/schema#",
          "type": "object",
          "required": ["success", "summary"],
          "properties": {
            "success": { "type": "boolean" },
            "summary": {
              "type": "object",
              "required": ["totalChecks", "healthy", "warning", "critical", "marketOpen", "checkedAt"],
              "properties": {
                "totalChecks": { "type": "integer" },
                "healthy": { "type": "integer" },
                "warning": { "type": "integer" },
                "critical": { "type": "integer" },
                "staleData": { "type": "integer" },
                "staleForecast": { "type": "integer" },
                "staleOptions": { "type": "integer" },
                "pendingSplits": { "type": "integer" },
                "marketOpen": { "type": "boolean" },
                "checkedAt": { "type": "string" }
              }
            },
            "healthStatuses": {
              "type": "array",
              "items": {
                "type": "object",
                "required": ["symbol", "timeframe", "overallHealth", "checkedAt"],
                "properties": {
                  "symbol": { "type": "string" },
                  "timeframe": { "type": "string" },
                  "coverage": { "type": "object" },
                  "freshness": { "type": "object" },
                  "jobs": { "type": "object" },
                  "forecast": { "type": "object" },
                  "options": { "type": "object" },
                  "market": { "type": "object" },
                  "overallHealth": { "type": "string", "enum": ["healthy", "warning", "critical"] },
                  "checkedAt": { "type": "string" }
                }
              }
            }
          }
        }
        EOF

        echo "Schema definitions created"
        ls -la /tmp/schemas/

    - name: Validate Edge Function TypeScript types match schemas
      run: |
        echo "## API Contract Validation Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Check chart endpoint exists
        if [ -f "supabase/functions/chart/index.ts" ]; then
          echo "✅ Chart endpoint found" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Chart endpoint missing" >> $GITHUB_STEP_SUMMARY
        fi

        # Check user-refresh endpoint exists
        if [ -f "supabase/functions/user-refresh/index.ts" ]; then
          echo "✅ User-refresh endpoint found" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ User-refresh endpoint missing" >> $GITHUB_STEP_SUMMARY
        fi

        # Check data-health endpoint exists
        if [ -f "supabase/functions/data-health/index.ts" ]; then
          echo "✅ Data-health endpoint found" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Data-health endpoint missing" >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY

    - name: Check Swift model compatibility
      run: |
        echo "### Swift Model Compatibility" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Check for required Swift response types
        SWIFT_API_CLIENT="client-macos/SwiftBoltML/Services/APIClient.swift"

        if [ -f "$SWIFT_API_CLIENT" ]; then
          # Check for ConsolidatedChartResponse
          if grep -q "ConsolidatedChartResponse" "$SWIFT_API_CLIENT"; then
            echo "✅ ConsolidatedChartResponse model defined" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ ConsolidatedChartResponse model not found" >> $GITHUB_STEP_SUMMARY
          fi

          # Check for DataHealthResponse
          if grep -q "DataHealthResponse" "$SWIFT_API_CLIENT"; then
            echo "✅ DataHealthResponse model defined" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ DataHealthResponse model not found" >> $GITHUB_STEP_SUMMARY
          fi

          # Check for UserRefreshResponse with new fields
          if grep -q "queuedJobs" "$SWIFT_API_CLIENT"; then
            echo "✅ UserRefreshResponse includes queuedJobs field" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ UserRefreshResponse missing queuedJobs field" >> $GITHUB_STEP_SUMMARY
          fi

          if grep -q "warnings" "$SWIFT_API_CLIENT"; then
            echo "✅ UserRefreshResponse includes warnings field" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ UserRefreshResponse missing warnings field" >> $GITHUB_STEP_SUMMARY
          fi

          if grep -q "nextExpectedUpdate" "$SWIFT_API_CLIENT"; then
            echo "✅ UserRefreshResponse includes nextExpectedUpdate field" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ UserRefreshResponse missing nextExpectedUpdate field" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "❌ Swift API client not found at $SWIFT_API_CLIENT" >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY

    - name: Verify endpoint URL consistency
      run: |
        echo "### Endpoint URL Consistency" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # List all Supabase functions
        echo "| Endpoint | Edge Function | Swift Method |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|---------------|--------------|" >> $GITHUB_STEP_SUMMARY

        for func_dir in supabase/functions/*/; do
          func_name=$(basename "$func_dir")

          # Skip shared folder
          if [ "$func_name" = "_shared" ]; then
            continue
          fi

          # Check if Swift client has a method for this function
          if grep -q "\"$func_name\"" "client-macos/SwiftBoltML/Services/APIClient.swift" 2>/dev/null; then
            echo "| $func_name | ✅ | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| $func_name | ✅ | ❓ |" >> $GITHUB_STEP_SUMMARY
          fi
        done

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Legend: ✅ = exists, ❓ = not explicitly referenced" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # EDGE FUNCTION INTEGRATION TESTS (security scan + shared dep validation)
  # ===========================================================================
  edge-function-integration:
    name: Edge Function Integration Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, test-edge-functions]
    if: needs.detect-changes.outputs.edge_functions == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Deno
      uses: denoland/setup-deno@v1
      with:
        deno-version: v2.x

    - name: Cache Deno dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.deno
          ~/.cache/deno
        key: ${{ runner.os }}-deno-${{ hashFiles('**/deno.lock') }}
        restore-keys: |
          ${{ runner.os }}-deno-

    - name: Security scan - check for hardcoded secrets
      run: |
        echo "Checking for common Edge Function issues..."

        # Check for hardcoded secrets
        if grep -r "sk-.*" supabase/functions/ --include="*.ts" --exclude-dir="_shared" | grep -v "// "; then
          echo "⚠️ Warning: Potential hardcoded secrets detected"
          echo "Make sure to use environment variables for sensitive data"
        fi

        # Check for CORS headers
        echo "Checking CORS configuration..."
        for func in supabase/functions/*/index.ts; do
          if [ -f "$func" ]; then
            if ! grep -q "Access-Control-Allow-Origin" "$func" && ! grep -q "corsHeaders" "$func"; then
              func_name=$(basename "$(dirname "$func")")
              echo "⚠️ $func_name may be missing CORS headers"
            fi
          fi
        done

        echo "Common issues check complete"

    - name: Check shared dependencies
      run: |
        echo "Validating shared utilities..."

        if [ -d "supabase/functions/_shared" ]; then
          echo "Found _shared directory"

          # Check each shared module can be imported
          for shared in supabase/functions/_shared/*.ts; do
            if [ -f "$shared" ]; then
              echo "Checking: $shared"
              deno check "$shared" || echo "⚠️ Warning: $shared has type errors"
            fi
          done
        else
          echo "No _shared directory found"
        fi

    - name: Verify function imports
      run: |
        echo "Checking function imports..."

        # Check that functions can import _shared utilities
        for func in supabase/functions/*/index.ts; do
          if [ -f "$func" ]; then
            func_name=$(basename "$(dirname "$func")")
            echo "Checking imports in: $func_name"

            # Try to resolve imports (dry run)
            deno check --no-lock "$func" || echo "⚠️ $func_name has import issues"
          fi
        done

    - name: Test coverage (if tests exist)
      continue-on-error: true
      run: |
        if find supabase/functions -name '*_test.ts' 2>/dev/null | grep -q .; then
          deno test --allow-all --coverage=coverage --recursive supabase/functions/
          deno coverage coverage --lcov > coverage.lcov
        fi

  # ===========================================================================
  # COMPREHENSIVE REPORT
  # ===========================================================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-ml, test-edge-functions, validate-migrations, test-ml, integration-test-ml, contract-tests, edge-function-integration]
    if: always()

    steps:
    - name: Generate summary
      run: |
        echo "# 🚀 CI Test Results (Lightweight)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Actor**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        echo "## 📊 Code Quality Checks" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Changed components
        echo "### Changed Components" >> $GITHUB_STEP_SUMMARY
        if [ "${{ needs.detect-changes.outputs.ml }}" = "true" ]; then
          echo "- 🐍 ML Code (linting + unit tests)" >> $GITHUB_STEP_SUMMARY
        fi
        if [ "${{ needs.detect-changes.outputs.edge_functions }}" = "true" ]; then
          echo "- ⚡ Edge Functions" >> $GITHUB_STEP_SUMMARY
        fi
        if [ "${{ needs.detect-changes.outputs.migrations }}" = "true" ]; then
          echo "- 🗄️ Database Migrations" >> $GITHUB_STEP_SUMMARY
        fi
        if [ "${{ needs.detect-changes.outputs.swift_client }}" = "true" ]; then
          echo "- 📱 Swift Client" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY

        # Job results
        echo "### Job Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # ML Linting
        if [ "${{ needs.detect-changes.outputs.ml }}" = "true" ]; then
          if [ "${{ needs.lint-ml.result }}" = "success" ]; then
            echo "✅ ML Linting: **PASSED**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.lint-ml.result }}" = "skipped" ]; then
            echo "⏭️ ML Linting: SKIPPED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ ML Linting: **FAILED**" >> $GITHUB_STEP_SUMMARY
          fi
        fi

        # ML Unit Tests
        if [ "${{ needs.detect-changes.outputs.ml }}" = "true" ]; then
          if [ "${{ needs.test-ml.result }}" = "success" ]; then
            echo "✅ ML Unit Tests (3.10 + 3.11): **PASSED**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.test-ml.result }}" = "skipped" ]; then
            echo "⏭️ ML Unit Tests: SKIPPED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ ML Unit Tests: **FAILED**" >> $GITHUB_STEP_SUMMARY
          fi
        fi

        # ML Integration Tests
        if [ "${{ needs.integration-test-ml.result }}" = "success" ]; then
          echo "✅ ML Integration Tests: **PASSED**" >> $GITHUB_STEP_SUMMARY
        elif [ "${{ needs.integration-test-ml.result }}" = "skipped" ]; then
          echo "⏭️ ML Integration Tests: SKIPPED (no requirements change)" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ ML Integration Tests: FAILED (non-blocking)" >> $GITHUB_STEP_SUMMARY
        fi

        # Edge Functions
        if [ "${{ needs.detect-changes.outputs.edge_functions }}" = "true" ]; then
          if [ "${{ needs.test-edge-functions.result }}" = "success" ]; then
            echo "✅ Edge Functions: **PASSED**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.test-edge-functions.result }}" = "skipped" ]; then
            echo "⏭️ Edge Functions: SKIPPED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Edge Functions: **FAILED**" >> $GITHUB_STEP_SUMMARY
          fi
        fi

        # Migrations
        if [ "${{ needs.detect-changes.outputs.migrations }}" = "true" ]; then
          if [ "${{ needs.validate-migrations.result }}" = "success" ]; then
            echo "✅ Migration Validation: **PASSED**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.validate-migrations.result }}" = "skipped" ]; then
            echo "⏭️ Migration Validation: SKIPPED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Migration Validation: **FAILED**" >> $GITHUB_STEP_SUMMARY
          fi
        fi

        # Contract Tests
        if [ "${{ needs.contract-tests.result }}" = "success" ]; then
          echo "✅ API Contract Tests: **PASSED**" >> $GITHUB_STEP_SUMMARY
        elif [ "${{ needs.contract-tests.result }}" = "skipped" ]; then
          echo "⏭️ API Contract Tests: SKIPPED" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ API Contract Tests: **FAILED**" >> $GITHUB_STEP_SUMMARY
        fi

        # Edge Function Integration Tests
        if [ "${{ needs.edge-function-integration.result }}" = "success" ]; then
          echo "✅ Edge Function Integration: **PASSED**" >> $GITHUB_STEP_SUMMARY
        elif [ "${{ needs.edge-function-integration.result }}" = "skipped" ]; then
          echo "⏭️ Edge Function Integration: SKIPPED" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ Edge Function Integration: FAILED (non-blocking)" >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "_Generated by GitHub Actions_" >> $GITHUB_STEP_SUMMARY

    - name: Check overall status
      run: |
        # Fail if any required job failed
        if [ "${{ needs.lint-ml.result }}" = "failure" ] || \
           [ "${{ needs.test-ml.result }}" = "failure" ] || \
           [ "${{ needs.test-edge-functions.result }}" = "failure" ] || \
           [ "${{ needs.validate-migrations.result }}" = "failure" ] || \
           [ "${{ needs.contract-tests.result }}" = "failure" ]; then
          echo "❌ One or more CI jobs failed"
          exit 1
        fi

        echo "✅ All CI checks passed!"
