# Project root Supabase config (used when deploying from repo root).
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "cygflaemtmwiwaviclks"

[functions]
# Worker called by cron/trigger-backfill with API key; JWT verification disabled.
# Auth enforced inside function via X-SB-Gateway-Key (SB_GATEWAY_KEY).
[functions.run-backfill-worker]
verify_jwt = false

# ga-strategy: Triggered by cron automation only, not user-facing.
# Auth enforced inside function via X-SB-Gateway-Key (SB_GATEWAY_KEY).
[functions.ga-strategy]
verify_jwt = false

[functions.options-chain]
verify_jwt = false

# Client-facing. JWT verified by Supabase platform.
[functions.get-unified-validation]
verify_jwt = true

[functions.strategies]
verify_jwt = false

[functions.strategy-backtest]
verify_jwt = false

[functions.strategy-backtest-worker]
verify_jwt = false

# chart: Public read-only chart data endpoint (OHLCV + ML enrichment + options).
# The macOS client and frontend authenticate with the Supabase anon key.
# verify_jwt = false allows anon-key requests through the gateway.
[functions.chart]
verify_jwt = false

# intraday-live-refresh: Called by pg_cron every 15 min during market hours.
# Auth enforced inside function via X-SB-Gateway-Key (SB_GATEWAY_KEY).
[functions.intraday-live-refresh]
verify_jwt = false
